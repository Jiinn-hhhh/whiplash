<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1280">
  <title>Whiplash Office Dashboard</title>
  <style>
    @font-face {
      font-family: 'DungGeunMo';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_six@1.2/DungGeunMo.woff') format('woff');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #111118;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 12px 0;
      font-family: 'DungGeunMo', monospace;
      color: #e0e0e0;
    }

    .controls {
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .controls label {
      font-size: 13px;
      color: #808090;
    }

    .controls input {
      background: #1a1a24;
      border: 2px solid #2a2a40;
      color: #e04060;
      font-family: 'DungGeunMo', monospace;
      font-size: 14px;
      padding: 4px 12px;
      border-radius: 3px;
      outline: none;
      width: 200px;
    }
    .controls input:focus {
      border-color: #e04060;
    }
    .controls input::placeholder {
      color: #505070;
    }

    #dashboard-canvas {
      border: 4px solid #000000;
      border-radius: 4px;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      cursor: default;
      max-width: 100%;
      height: auto;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .footer-text {
      margin-top: 12px;
      font-size: 11px;
      color: #606070;
      text-align: center;
    }
    .footer-text a {
      color: #8090b0;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="controls">
    <label for="project-input">PROJECT:</label>
    <input type="text" id="project-input" placeholder="project name" spellcheck="false" autocomplete="off">
  </div>

  <canvas id="dashboard-canvas"></canvas>

  <div class="footer-text">
    Whiplash Office Dashboard &mdash; 3s polling &middot; 1280x1100 pixel art
  </div>

  <script src="sprites.js"></script>
  <script src="office.js"></script>
  <script>
    (function() {
      const params = new URLSearchParams(window.location.search);
      const input = document.getElementById('project-input');

      if (params.has('project')) {
        input.value = params.get('project');
      }

      // Try to get project from initial API call
      fetch('/api/status')
        .then(r => r.json())
        .then(data => {
          if (data.project && !input.value) {
            input.value = data.project;
          }
        })
        .catch(() => {});

      const canvas = document.getElementById('dashboard-canvas');
      initOffice(canvas);
    })();
  </script>
</body>
</html>
