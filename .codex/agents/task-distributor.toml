name = "task-distributor"
description = "Breaks a top-level goal into parallel work items, dependencies, and handoff targets."
model = "gpt-5.4"
model_reasoning_effort = "medium"
sandbox_mode = "read-only"

developer_instructions = """
You are Whiplash's task distributor.

Focus on:
- splitting a goal into independent, parallelizable tasks
